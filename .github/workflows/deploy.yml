name: Deploy with Cloudflare Tunnel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Clone ai-engine plugin
        run: |
          mkdir -p deploy/plugin
          gh repo clone jordymeow/ai-engine deploy/plugin -- --quiet --depth 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy deploy files
        run: |
          cp deploy/docker-compose.yml .
          cp deploy/.env.example .env

      - name: Inject secrets into .env
        run: |
          sed -i "s/^MYSQL_ROOT_PASSWORD=.*/MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}/" .env
          sed -i "s/^MYSQL_PASSWORD=.*/MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}/" .env
          sed -i "s/^CF_TUNNEL_TOKEN=.*/CF_TUNNEL_TOKEN=${{ secrets.CF_TUNNEL_TOKEN }}/" .env

      - name: Start Docker Compose
        run: docker compose up -d --wait --wait-timeout 120

      - name: Verify tunnel connected
        run: |
          sleep 15
          docker compose logs --tail=30 cloudflared

      - name: Verify public URL
        run: |
          sleep 10
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -sI -w "%{http_code}" -o /dev/null -L --max-time 15 "https://jwp00.mrme.tech/")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "Site is reachable!"
              exit 0
            fi
            sleep 5
          done
          echo "Site not reachable after 20 attempts"
          docker compose logs --tail=50 cloudflared
          exit 1

      - name: Keep alive
        run: |
          echo "Tunnel connected. Waiting for hostname configuration..."
          while true; do
            echo "$(date): tunnel active"
            sleep 60
          done
