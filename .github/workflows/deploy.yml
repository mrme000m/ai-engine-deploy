name: Deploy with Cloudflare Tunnel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone ai-engine plugin
        run: |
          mkdir -p deploy/plugin
          gh repo clone jordymeow/ai-engine deploy/plugin -- --quiet --depth 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy deploy files
        run: |
          cp deploy/docker-compose.yml .
          cp deploy/.env.example .env

      - name: Inject secrets into .env
        run: |
          sed -i "s/^MYSQL_ROOT_PASSWORD=.*/MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}/" .env
          sed -i "s/^MYSQL_PASSWORD=.*/MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}/" .env
          sed -i "s/^CF_TUNNEL_TOKEN=.*/CF_TUNNEL_TOKEN=${{ secrets.CF_TUNNEL_TOKEN }}/" .env

      - name: Start Docker Compose
        run: docker compose up -d --wait --wait-timeout 120

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "WordPress is up!"
              exit 0
            fi
            echo "Waiting for WordPress... ($i/30)"
            sleep 5
          done
          echo "WordPress failed to start"
          exit 1

      - name: Keep alive
        run: |
          echo "Tunnel is live. Site accessible at https://jwp00.mrme.tech/"
          echo "Keeping runner alive to maintain tunnel connectivity..."
          while true; do
            echo "$(date): tunnel active, wordpress healthy"
            sleep 60
          done
