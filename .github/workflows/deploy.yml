name: Deploy with Cloudflare Tunnel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Clone ai-engine plugin
        run: |
          mkdir -p deploy/plugin
          gh repo clone jordymeow/ai-engine deploy/plugin -- --quiet --depth 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy deploy files
        run: |
          cp deploy/docker-compose.yml .
          cp deploy/.env.example .env
          mv deploy/plugin ./plugin

      - name: Inject secrets into .env
        run: |
          sed -i "s/^MYSQL_ROOT_PASSWORD=.*/MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}/" .env
          sed -i "s/^MYSQL_PASSWORD=.*/MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}/" .env
          sed -i "s/^CF_TUNNEL_TOKEN=.*/CF_TUNNEL_TOKEN=${{ secrets.CF_TUNNEL_TOKEN }}/" .env

      - name: Start Docker Compose
        run: docker compose up -d --wait --wait-timeout 120

      - name: Verify plugin mounted
        run: |
          sleep 5
          echo "=== Plugin directory ==="
          docker compose exec -T wordpress ls -la /var/www/html/wp-content/plugins/ai-engine/ 2>&1 | head -15
          echo "=== Checking ai-engine.php ==="
          docker compose exec -T wordpress test -f /var/www/html/wp-content/plugins/ai-engine/ai-engine.php && echo "Plugin file found" || echo "PLUGIN FILE MISSING!"

      - name: Install WordPress and activate AI Engine
        run: |
          sleep 10
          docker compose exec -T wordpress bash -c '
            curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
            chmod +x wp-cli.phar
            # Install WP core
            php wp-cli.phar core install \
              --url=https://jwp00.mrme.tech \
              --title="AI Engine Demo" \
              --admin_user=admin \
              --admin_password=admin123 \
              --admin_email=admin@jwp00.mrme.tech \
              --skip-email \
              --allow-root 2>&1 || echo "WP install may have already run"
            # Activate AI Engine
            php wp-cli.phar plugin activate ai-engine --allow-root 2>&1
            php wp-cli.phar plugin list --allow-root 2>&1
          '

      - name: Configure free models and OpenRouter
        run: |
          # Copy setup script into the container
          docker compose cp deploy/scripts/setup-mwai.php wordpress:/tmp/setup-mwai.php
          # Run it with WP-CLI
          docker compose exec -T -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" wordpress bash -c '
            php wp-cli.phar eval-file /tmp/setup-mwai.php --allow-root
          '

      - name: Verify tunnel connected
        run: |
          sleep 15
          docker compose logs --tail=30 cloudflared

      - name: Verify public URL
        run: |
          sleep 10
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -sI -w "%{http_code}" -o /dev/null -L --max-time 15 "https://jwp00.mrme.tech/")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "Site is reachable!"
              exit 0
            fi
            sleep 5
          done
          echo "Site not reachable after 20 attempts"
          docker compose logs --tail=50 cloudflared
          exit 1

      - name: Keep alive
        run: |
          echo "Tunnel connected. Waiting for hostname configuration..."
          while true; do
            echo "$(date): tunnel active"
            sleep 60
          done
